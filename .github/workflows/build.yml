name: Build Plugin From Zip

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Cho phép bạn bấm nút Build thủ công trên điện thoại

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Tải file .zip từ GitHub về máy ảo ──────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Giải nén file code của bạn vào thư mục tạm ──────────────
      - name: Unzip source code
        run: |
          # Tìm file .zip bất kỳ nằm ở thư mục gốc và giải nén nó
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "LỖI: Không tìm thấy file .zip nào ở thư mục gốc!"
            exit 1
          fi
          echo "Đang giải nén file: $ZIP_FILE"
          unzip "$ZIP_FILE" -d extracted_code
          
          # Hiển thị cấu trúc để kiểm tra xem file đã ra chưa
          echo "=== Cấu trúc file sau khi giải nén ==="
          ls -R extracted_code

      # ── 3. Cài đặt Java 21 ──────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # ── 4. Tìm file pom.xml và tiến hành Build Maven ────────────────
      - name: Build with Maven
        run: |
          # Tự động tìm vị trí file pom.xml bên trong thư mục vừa giải nén
          POM_PATH=$(find extracted_code -name "pom.xml" | head -n 1)
          if [ -z "$POM_PATH" ]; then
            echo "LỖI: Không tìm thấy file pom.xml bên trong file zip!"
            exit 1
          fi
          echo "Tìm thấy pom.xml tại: $POM_PATH"
          mvn -B clean package --file "$POM_PATH" --no-transfer-progress

      # ── 5. Gom file .jar kết quả để bạn tải về điện thoại ───────────
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft-Plugin-JAR
          path: extracted_code/**/target/*.jar
          if-no-files-found: error
          retention-days: 30
          
